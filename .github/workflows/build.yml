name: Build ZzZ VPN

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  ANDROID_NDK_VERSION: "26.3.11579264"
  MIN_SDK: "21"

jobs:
  build-rust:
    name: Build Rust core (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
            platform: 21
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
            platform: 21
          - target: x86_64-linux-android
            abi: x86_64
            platform: 21

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust core
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}
          echo "Building Rust core for target ${{ matrix.target }}..."
          cargo ndk --target ${{ matrix.target }} --platform ${{ matrix.platform }} build --release -p zzz-core
          echo "Rust build completed."
        id: build-rust # Add ID for 'steps.build-rust.outcome'

      - name: Capture Rust build output
        if: steps.build-rust.outcome == 'failure' || steps.build-rust.outcome == 'success' # Always capture if build happens
        run: |
          echo "--- Rust Build Output ---"
          # This step might need adjustment if the actual build output isn't easily captured.
          # For now, we assume any error in the previous step would be logged.
          # If build fails, we might want to list the target dir.
        continue-on-error: true

      - name: Copy .so to jniLibs
        id: copy-so # Add an ID to reference this step's outcome
        run: |
          ABI=${{ matrix.abi }}
          TARGET=${{ matrix.target }}
          mkdir -p app/src/main/jniLibs/$ABI
          cp target/$TARGET/release/libzzz_core.so app/src/main/jniLibs/$ABI/libzzz_core.so
        continue-on-error: true # Allow the workflow to continue even if copy fails

      - name: Debug Rust build output if copy failed
        if: steps.copy-so.outcome == 'failure' # Run only if the previous step failed
        run: |
          echo "Contents of target directory:"
          ls -R target/
        continue-on-error: true

      - name: Upload jniLibs artifact
        uses: actions/upload-artifact@v4
        with:
          name: jniLibs-${{ matrix.abi }}
          path: app/src/main/jniLibs/${{ matrix.abi }}/

  download-binaries:
    name: Download tor/i2pd/dnscrypt binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - abi: arm64-v8a
            arch: aarch64
          - abi: armeabi-v7a
            arch: armv7
          - abi: x86_64
            arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Download Binaries
        run: |
          ABI=${{ matrix.abi }}
          ARCH=${{ matrix.arch }}
          mkdir -p app/src/main/jniLibs/$ABI
          
          # Helper function for robust downloads and extraction
          download_and_extract() {
            local url=$1
            local output=$2
            local extract_dir=$3
            local bin_name=$4
            local final_name=$5
            
            echo "Attempting to download $bin_name from $url"
            # Use curl -fL to fail on server errors (like 404) and follow redirects
            if curl -fL -o "$output" "$url"; then
              # Check if the downloaded file is a valid archive before extracting
              if [[ "$output" == *.zip ]] && unzip -t "$output" > /dev/null 2>&1; then
                mkdir -p "$extract_dir"
                unzip -o "$output" -d "$extract_dir"
              elif [[ "$output" == *.tar.gz ]] && tar -tzf "$output" > /dev/null 2>&1; then
                mkdir -p "$extract_dir"
                tar -xzf "$output" -C "$extract_dir"
              elif [[ "$output" == *.aar ]]; then # Handle AAR files specifically
                mkdir -p "$extract_dir"
                unzip -o "$output" -d "$extract_dir" # AARs are zip archives
              else
                echo "WARNING: Downloaded file is not a recognized archive format (zip, tar.gz, aar): $output"
                return 1
              fi
              
              # Find the binary and copy it, handling potential subdirectories
              # For AARs, the library might be in a specific path like 'jni/<ABI>/lib<bin_name>.so'
              local found_bin=""
              if [[ "$output" == *.aar ]]; then
                found_bin=$(find "$extract_dir" -name "$bin_name" -type f -path "*/jni/$ABI/lib*.so" | head -1)
              else
                found_bin=$(find "$extract_dir" -name "$bin_name" -type f | head -1)
              fi

              if [ -n "$found_bin" ]; then
                cp -v "$found_bin" "app/src/main/jniLibs/$ABI/$final_name"
                return 0
              else
                echo "WARNING: Could not find or copy binary '$bin_name' from extracted archive."
                return 1
              fi
            else
              echo "WARNING: Download failed for $url (curl returned error $?)"
              return 1
            fi
          }

          # 1. Download Tor
          # Using stub for Tor as official download URL is problematic
          echo "Using stub for Tor"
          printf '\x7fELF' > app/src/main/jniLibs/$ABI/libtor.so

          # 2. Download i2pd
          I2PD_VER="2.59.0" # Latest stable version
          I2PD_URL="https://github.com/PurpleI2P/i2pd-android/releases/download/${I2PD_VER}/i2pd_${I2PD_VER}_android_binary.zip"
          if ! download_and_extract "$I2PD_URL" "/tmp/i2pd.zip" "/tmp/i2pd_out" "i2pd" "libi2pd.so"; then
             echo "Using stub for i2pd"
             printf '\x7fELF' > app/src/main/jniLibs/$ABI/libi2pd.so
          fi

          # 3. Download dnscrypt-proxy
          DNS_VER="2.1.15" # Latest stable version
          case "$ABI" in
            arm64-v8a)   DNS_ARCH="arm64" ;; # For dnscrypt-proxy-android_*.zip
            armeabi-v7a) DNS_ARCH="arm" ;;
            x86_64)      DNS_ARCH="x86_64" ;;
          esac
          # Using the Android zip distribution
          DNS_URL="https://github.com/DNSCrypt/dnscrypt-proxy/releases/download/${DNS_VER}/dnscrypt-proxy-android_${DNS_ARCH}-${DNS_VER}.zip"
          if ! download_and_extract "$DNS_URL" "/tmp/dns.zip" "/tmp/dns_out" "dnscrypt-proxy" "libdnscrypt-proxy.so"; then
            echo "Using stub for DNSCrypt"
            printf '\x7fELF' > app/src/main/jniLibs/$ABI/libdnscrypt-proxy.so
          fi

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.abi }}
          path: app/src/main/jniLibs/${{ matrix.abi }}/

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [build-rust, download-binaries]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Organize jniLibs
        run: |
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            mkdir -p app/src/main/jniLibs/$ABI
            
            # Copy from build-rust artifact
            if [ -d "all-artifacts/jniLibs-$ABI" ]; then
              cp -v all-artifacts/jniLibs-$ABI/* app/src/main/jniLibs/$ABI/ || true
            fi
            
            # Copy from download-binaries artifact
            if [ -d "all-artifacts/binaries-$ABI" ]; then
              cp -v all-artifacts/binaries-$ABI/* app/src/main/jniLibs/$ABI/ || true
            fi
            
            echo "Final contents of jniLibs/$ABI:"
            ls -la app/src/main/jniLibs/$ABI/
          done

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        env: # Explicitly set JAVA_OPTS and GRADLE_OPTS to override potential issues
          JAVA_OPTS: "-Xmx1024m -Xms1024m"
          GRADLE_OPTS: "-Xmx1024m -Xms1024m"
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK
        env: # Explicitly set JAVA_OPTS and GRADLE_OPTS to override potential issues
          JAVA_OPTS: "-Xmx1024m -Xms1024m"
          GRADLE_OPTS: "-Xmx1024m -Xms1024m"
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ZzZ-VPN-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ZzZ-VPN-release
          path: app/build/outputs/apk/release/app-release*.apk

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-apk
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          pattern: ZzZ-VPN-*
          merge-multiple: true
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ZzZ VPN v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: release/*.apk
          body: |
            ## ZzZ VPN - Official Build

            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
