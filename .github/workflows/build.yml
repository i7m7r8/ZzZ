name: Build ZzZ VPN

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  ANDROID_NDK_VERSION: "26.3.11579264"
  MIN_SDK: "21"

jobs:
  build-rust:
    name: Build Rust core (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
            platform: 21
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
            platform: 21
          - target: x86_64-linux-android
            abi: x86_64
            platform: 21

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: zzz-core

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust core
        working-directory: zzz-core
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}
          cargo ndk --target ${{ matrix.target }} --platform ${{ matrix.platform }} build --release

      - name: Copy .so to jniLibs
        run: |
          ABI=${{ matrix.abi }}
          TARGET=${{ matrix.target }}
          mkdir -p app/src/main/jniLibs/$ABI
          cp zzz-core/target/$TARGET/release/libzzz_core.so \
             app/src/main/jniLibs/$ABI/libzzz_core.so

      - name: Upload jniLibs artifact
        uses: actions/upload-artifact@v4
        with:
          name: jniLibs-${{ matrix.abi }}
          path: app/src/main/jniLibs/${{ matrix.abi }}/

  download-binaries:
    name: Download tor/i2pd/dnscrypt binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - abi: arm64-v8a
            arch: aarch64
          - abi: armeabi-v7a
            arch: armv7
          - abi: x86_64
            arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Download Binaries
        run: |
          ABI=${{ matrix.abi }}
          ARCH=${{ matrix.arch }}
          mkdir -p app/src/main/jniLibs/$ABI
          
          # 1. Download Tor
          TOR_VER="0.4.8.11"
          # Try primary URL (Guardian Project)
          TOR_URL="https://github.com/guardianproject/tor-android/releases/download/tor-${TOR_VER}/tor-android-binary-${ARCH}.zip"
          echo "Downloading Tor from $TOR_URL"
          curl -L -o /tmp/tor.zip "$TOR_URL" || true
          
          if [ -f /tmp/tor.zip ] && unzip -t /tmp/tor.zip > /dev/null 2>&1; then
            mkdir -p /tmp/tor_out
            unzip -o /tmp/tor.zip -d /tmp/tor_out/
            find /tmp/tor_out -name "tor" -type f | head -1 | xargs -I{} cp {} app/src/main/jniLibs/$ABI/libtor.so
          else
            echo "WARNING: Tor download failed or invalid zip, using stub"
            printf '\x7fELF' > app/src/main/jniLibs/$ABI/libtor.so
          fi

          # 2. Download i2pd
          I2PD_VER="2.51.0"
          I2PD_URL="https://github.com/PurpleI2P/i2pd/releases/download/${I2PD_VER}/i2pd_${I2PD_VER}_android_${ABI}.tar.gz"
          echo "Downloading i2pd from $I2PD_URL"
          curl -L -o /tmp/i2pd.tar.gz "$I2PD_URL" || true
          
          if [ -f /tmp/i2pd.tar.gz ] && tar -tzf /tmp/i2pd.tar.gz > /dev/null 2>&1; then
            mkdir -p /tmp/i2pd_out
            tar -xzf /tmp/i2pd.tar.gz -C /tmp/i2pd_out/
            find /tmp/i2pd_out -name "i2pd" -type f | head -1 | xargs -I{} cp {} app/src/main/jniLibs/$ABI/libi2pd.so
          else
             echo "WARNING: i2pd download failed, using stub"
             printf '\x7fELF' > app/src/main/jniLibs/$ABI/libi2pd.so
          fi

          # 3. Download dnscrypt-proxy
          DNS_VER="2.1.5"
          case "$ABI" in
            arm64-v8a)   DNS_ARCH="arm64" ;;
            armeabi-v7a) DNS_ARCH="arm" ;;
            x86_64)      DNS_ARCH="x86_64" ;;
          esac
          DNS_URL="https://github.com/DNSCrypt/dnscrypt-proxy/releases/download/${DNS_VER}/dnscrypt-proxy-android_${DNS_ARCH}-${DNS_VER}.tar.gz"
          echo "Downloading DNSCrypt from $DNS_URL"
          curl -L -o /tmp/dns.tar.gz "$DNS_URL" || true
          
          if [ -f /tmp/dns.tar.gz ] && tar -tzf /tmp/dns.tar.gz > /dev/null 2>&1; then
            mkdir -p /tmp/dns_out
            tar -xzf /tmp/dns.tar.gz -C /tmp/dns_out/
            find /tmp/dns_out -name "dnscrypt-proxy" -type f | head -1 | xargs -I{} cp {} app/src/main/jniLibs/$ABI/libdnscrypt-proxy.so
          else
            echo "WARNING: DNSCrypt download failed, using stub"
            printf '\x7fELF' > app/src/main/jniLibs/$ABI/libdnscrypt-proxy.so
          fi

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.abi }}
          path: app/src/main/jniLibs/${{ matrix.abi }}/

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [build-rust, download-binaries]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download all jniLibs artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jniLibs-*
          path: jniLibs-artifacts

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: binaries-artifacts

      - name: Organize jniLibs
        run: |
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            mkdir -p app/src/main/jniLibs/$ABI
            
            # Copy from jniLibs artifact
            if [ -d "jniLibs-artifacts/jniLibs-$ABI" ]; then
              cp -v jniLibs-artifacts/jniLibs-$ABI/* app/src/main/jniLibs/$ABI/ || true
            fi
            
            # Copy from binaries artifact
            if [ -d "binaries-artifacts/binaries-$ABI" ]; then
              cp -v binaries-artifacts/binaries-$ABI/* app/src/main/jniLibs/$ABI/ || true
            fi
            
            echo "Contents of jniLibs/$ABI:"
            ls -la app/src/main/jniLibs/$ABI/
          done

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ZzZ-VPN-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ZzZ-VPN-release
          path: app/build/outputs/apk/release/app-release*.apk

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-apk
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          pattern: ZzZ-VPN-*
          merge-multiple: true
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ZzZ VPN v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: release/*.apk
          body: |
            ## ZzZ VPN - Updated Build

            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
